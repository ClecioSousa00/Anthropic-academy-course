name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')

    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/big-pickle
          prompt: |
            Você é um engenheiro de software sênior revisando este Pull Request.

            Objetivo:
            Fazer uma revisão técnica profunda e ajudar o autor do PR a melhorar o código.

            Analise cuidadosamente:

            1. Bugs potenciais
            2. Problemas de lógica
            3. Problemas de segurança
            4. Problemas de performance
            5. Qualidade e legibilidade do código
            6. Boas práticas e arquitetura
            7. Código duplicado ou complexidade desnecessária
            8. Possíveis edge cases não tratados
            9. Testes faltando ou insuficientes

            Para cada problema encontrado:

            - Explique claramente o problema
            - Mostre em qual arquivo ou trecho ele ocorre
            - Explique por que isso pode causar problemas
            - Sugira uma possível solução
            - Quando possível, mostre um pequeno exemplo de código corrigido

            IMPORTANTE:
            - NÃO modifique o código automaticamente
            - NÃO aplique correções no repositório
            - Apenas sugira melhorias
            - O desenvolvedor é responsável por decidir se aplica ou não as mudanças

            Estruture a resposta da seguinte forma:

            ## 🔎 Resumo da revisão
            Breve resumo da qualidade geral do PR.

            ## ⚠️ Problemas encontrados
            Lista de problemas importantes.

            ## 💡 Sugestões de melhoria
            Sugestões opcionais para melhorar o código.
